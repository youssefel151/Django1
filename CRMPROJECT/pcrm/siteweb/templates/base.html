<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}CRM PROJECT{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
      :root {
        --app-bg: #f4f6f8;
        --app-surface: #ffffff;
        --app-surface-muted: #eef3f6;
        --app-border: #d9e1e7;
        --app-text: #17212b;
        --app-muted: #637083;
        --app-primary: #0f766e;
        --app-primary-dark: #115e59;
        --app-accent: #2563eb;
        --app-danger: #dc2626;
        --app-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      }
      * {
        letter-spacing: 0;
      }
      body {
        min-height: 100vh;
        background: var(--app-bg);
        color: var(--app-text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .navbar {
        background: rgba(255, 255, 255, 0.94) !important;
        border-bottom: 1px solid var(--app-border);
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
        backdrop-filter: blur(14px);
      }
      .navbar-brand {
        align-items: center;
        color: var(--app-text) !important;
        display: inline-flex;
        gap: 0.6rem;
        font-weight: 700;
      }
      .brand-mark {
        align-items: center;
        background: var(--app-primary);
        border-radius: 8px;
        color: #fff;
        display: inline-flex;
        height: 2rem;
        justify-content: center;
        width: 2rem;
      }
      .navbar .nav-link {
        border-radius: 8px;
        color: var(--app-muted) !important;
        font-weight: 600;
        padding: 0.55rem 0.75rem;
      }
      .navbar .nav-link:hover,
      .navbar .nav-link:focus {
        background: var(--app-surface-muted);
        color: var(--app-text) !important;
      }
      .navbar-toggler {
        border-color: var(--app-border);
      }
      .navbar-toggler-icon {
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba%2823, 33, 43, 0.86%29' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
      }
      .app-shell {
        padding-bottom: 3rem;
        padding-top: 2rem;
      }
      .card {
        background: var(--app-surface);
        border: 1px solid var(--app-border);
        border-radius: 8px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.04);
      }
      .card-title {
        color: var(--app-muted);
        font-size: 0.92rem;
        font-weight: 700;
        margin-bottom: 0.75rem;
      }
      .display-6 {
        color: var(--app-text);
        font-weight: 800;
        margin-bottom: 0;
      }
      .stat-card {
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .stat-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 0.75rem 1.5rem rgba(15, 23, 42, 0.08);
      }
      .table-actions {
        white-space: nowrap;
      }
      .card-row {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }
      .card-row > * {
        flex: 1 1 220px;
      }
      .stat {
        background: var(--app-text);
        color: #fff;
        border-radius: 8px;
        padding: 1.25rem;
        box-shadow: 0 0.5rem 1.25rem rgba(15, 23, 42, 0.1);
      }
      .stat-value {
        font-size: 2rem;
        font-weight: 800;
        line-height: 1;
      }
      .stat-label {
        color: rgba(255, 255, 255, 0.78);
        margin-top: 0.35rem;
      }
      .search-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-bottom: 1rem;
      }
      .search-bar input,
      .search-bar select {
        flex: 1 1 220px;
      }
      .btn-muted {
        --bs-btn-color: #fff;
        --bs-btn-bg: #526071;
        --bs-btn-border-color: #526071;
        --bs-btn-hover-color: #fff;
        --bs-btn-hover-bg: #425063;
        --bs-btn-hover-border-color: #425063;
      }
      .btn-gold {
        --bs-btn-color: #fff;
        --bs-btn-bg: var(--app-accent);
        --bs-btn-border-color: var(--app-accent);
        --bs-btn-hover-color: #fff;
        --bs-btn-hover-bg: #1d4ed8;
        --bs-btn-hover-border-color: #1d4ed8;
      }
      .btn-primary,
      .btn-secondary {
        --bs-btn-color: #fff;
        --bs-btn-bg: var(--app-primary);
        --bs-btn-border-color: var(--app-primary);
        --bs-btn-hover-color: #fff;
        --bs-btn-hover-bg: var(--app-primary-dark);
        --bs-btn-hover-border-color: var(--app-primary-dark);
        --bs-btn-active-bg: var(--app-primary-dark);
        --bs-btn-active-border-color: var(--app-primary-dark);
      }
      .btn,
      .form-control,
      .form-select {
        border-radius: 8px;
      }
      .form-control,
      .form-select {
        border-color: var(--app-border);
        min-height: 2.75rem;
      }
      .form-control:focus,
      .form-select:focus {
        border-color: var(--app-primary);
        box-shadow: 0 0 0 0.2rem rgba(15, 118, 110, 0.14);
      }
      .empty-state {
        color: var(--app-muted);
        padding: 2rem;
        text-align: center;
      }
      .table {
        margin-bottom: 0;
      }
      .table > :not(caption) > * > * {
        border-bottom-color: var(--app-border);
        padding: 0.85rem 1rem;
        vertical-align: middle;
      }
      .table-dark {
        --bs-table-bg: var(--app-text);
      }
      .table-wrap {
        background: var(--app-surface);
        border: 1px solid var(--app-border);
        border-radius: 8px;
        box-shadow: var(--app-shadow);
        overflow: hidden;
      }
      .page-header {
        align-items: end;
        display: flex;
        gap: 1rem;
        justify-content: space-between;
        margin-bottom: 1.5rem;
      }
      .page-kicker {
        color: var(--app-primary);
        font-size: 0.78rem;
        font-weight: 800;
        margin-bottom: 0.35rem;
        text-transform: uppercase;
      }
      .page-title {
        font-size: clamp(1.8rem, 3vw, 2.8rem);
        font-weight: 800;
        margin: 0;
      }
      .page-subtitle {
        color: var(--app-muted);
        margin: 0.55rem 0 0;
        max-width: 56rem;
      }
      .auth-panel {
        display: grid;
        gap: 1.25rem;
        grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.75fr);
        min-height: calc(100vh - 170px);
      }
      .auth-hero {
        align-items: end;
        background:
          linear-gradient(145deg, rgba(15, 118, 110, 0.94), rgba(37, 99, 235, 0.82)),
          url("https://images.unsplash.com/photo-1523580846011-d3a5bc25702b?auto=format&fit=crop&w=1400&q=80");
        background-position: center;
        background-size: cover;
        border-radius: 8px;
        color: #fff;
        display: flex;
        min-height: 34rem;
        overflow: hidden;
        padding: clamp(1.5rem, 4vw, 3rem);
      }
      .auth-hero h1 {
        font-size: clamp(2rem, 5vw, 4.25rem);
        font-weight: 850;
        line-height: 1;
        margin-bottom: 1rem;
      }
      .auth-hero p {
        color: rgba(255, 255, 255, 0.84);
        font-size: 1.05rem;
        max-width: 42rem;
      }
      .auth-card {
        align-self: center;
        background: var(--app-surface);
        border: 1px solid var(--app-border);
        border-radius: 8px;
        box-shadow: var(--app-shadow);
        padding: clamp(1.25rem, 4vw, 2rem);
      }
      .auth-card h2 {
        font-weight: 800;
        margin-bottom: 0.5rem;
      }
      .auth-card p {
        color: var(--app-muted);
      }
      .auth-card form p {
        margin-bottom: 1rem;
      }
      .auth-card form label {
        color: var(--app-text);
        display: block;
        font-weight: 700;
        margin-bottom: 0.35rem;
      }
      .auth-card form input,
      .auth-card form select,
      .auth-card form textarea {
        background: #fff;
        border: 1px solid var(--app-border);
        border-radius: 8px;
        color: var(--app-text);
        min-height: 2.75rem;
        padding: 0.55rem 0.75rem;
        width: 100%;
      }
      .auth-card form input:focus,
      .auth-card form select:focus,
      .auth-card form textarea:focus {
        border-color: var(--app-primary);
        box-shadow: 0 0 0 0.2rem rgba(15, 118, 110, 0.14);
        outline: none;
      }
      .actions-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
      }
      .pagination {
        align-items: center;
        gap: 0.5rem;
        justify-content: center;
        margin-top: 1rem;
      }
      .pagination a,
      .pagination span {
        border: 1px solid rgba(15, 23, 42, 0.12);
        border-radius: 6px;
        padding: 0.45rem 0.75rem;
        text-decoration: none;
      }
      .pagination .current {
        background: var(--app-text);
        color: #fff;
      }
      @media (max-width: 991.98px) {
        .auth-panel {
          grid-template-columns: 1fr;
        }
        .auth-hero {
          min-height: 22rem;
        }
        .page-header {
          align-items: start;
          flex-direction: column;
        }
      }
    </style>
    {% block extra_css %}{% endblock %}
  </head>
  <body>
    {% include 'navbar.html' %}
    <main class="app-shell">
      <div class="container">
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-{{ message.tags|default:'warning' }} alert-dismissible fade show" role="alert">
          <strong>{{ message }}</strong>
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
      {% endif %}
      {% block content %}

      {% endblock %}
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    {% block extra_js %}{% endblock %}
  </body>
</html>
