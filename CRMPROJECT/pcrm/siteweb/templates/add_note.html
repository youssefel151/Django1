{% extends 'base.html' %}

{% block content %}
<div class="container mt-4" style="max-width: 640px;">
  <div class="card p-4 shadow-sm">
    <h3 class="text-dark fw-bold mb-4">Saisir une note</h3>
    <form method="POST">
      {% csrf_token %}
      {% for field in form %}
        <div class="mb-3">
          <label class="form-label text-secondary fw-semibold">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}
            <div class="text-danger small">{{ field.errors }}</div>
          {% endif %}
        </div>
      {% endfor %}
      <button type="submit" class="btn btn-success w-100 mt-2 fw-bold">Valider la note</button>
    </form>
  </div>
</div>
{% endblock %}
