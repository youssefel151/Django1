<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: sans-serif; padding: 20px; }
    h1 { color: #333; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background-color: #f2f2f2; }
  </style>
</head>
<body>
  <h1>Bulletin de Notes</h1>
  <p><strong>Etudiant :</strong> {{ etudiant.prenom }} {{ etudiant.nom }}</p>
  <p><strong>Filiere :</strong> {{ etudiant.filiere }}</p>
  <table>
    <tr><th>Matiere</th><th>Note</th></tr>
    {% for note in notes %}
      <tr><td>{{ note.matiere }}</td><td>{{ note.valeur }}/20</td></tr>
    {% endfor %}
  </table>
  <h3>Moyenne Generale : {{ moyenne }}/20</h3>
</body>
</html>
