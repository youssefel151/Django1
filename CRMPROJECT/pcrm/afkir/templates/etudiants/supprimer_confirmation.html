{% extends 'base.html' %}

{% block title %}Supprimer etudiant - School CRM{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm p-4 text-center">
      <h1 class="h4 text-danger mb-3">Confirmer la suppression</h1>
      <p>Voulez-vous supprimer definitivement cet etudiant ? Cette action est irreversible.</p>
      <form method="POST">
        {% csrf_token %}
        <div class="d-grid gap-2 mt-4">
          <button type="submit" class="btn btn-danger">Oui, supprimer</button>
          <a href="{% url 'afkir:liste_etudiants' %}" class="btn btn-outline-secondary">Annuler</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
