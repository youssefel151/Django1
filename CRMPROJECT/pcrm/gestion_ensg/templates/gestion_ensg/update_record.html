{% extends 'gestion_ensg/base.html' %}

{% block scolarite_content %}

<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card">
            <div class="card-body">
            <h2 class="mb-4">Modifier Enseignant</h2>

            <form method="POST">
                {% csrf_token %}

                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                {% endfor %}

                <button type="submit" class="btn btn-primary">Modifier</button>
                <a href="{% url 'gestion_ensg:home' %}" class="btn btn-secondary">Annuler</a>
            </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
