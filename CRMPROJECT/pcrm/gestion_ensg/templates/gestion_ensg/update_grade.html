{% extends 'gestion_ensg/base.html' %}

{% block content %}

<h2>Modifier grade</h2>

<form method="POST" class="mt-3">
    {% csrf_token %}
    <div class="mb-3">
        <label class="form-label" for="{{ form.nom.id_for_label }}">Nom</label>
        {{ form.nom }}
    </div>

    <button type="submit" class="btn btn-primary">
        Enregistrer
    </button>

    <a href="{% url 'gestion_ensg:grades' %}" class="btn btn-secondary">
        Annuler
    </a>
</form>

{% endblock %}
