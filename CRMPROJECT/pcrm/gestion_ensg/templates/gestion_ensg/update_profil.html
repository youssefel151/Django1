{% extends 'gestion_ensg/base.html' %}

{% block scolarite_content %}

<div class="card">
    <div class="card-body">
<h2>Modifier profil</h2>

<form method="POST" class="mt-3">
    {% csrf_token %}
    <div class="mb-3">
        <label class="form-label" for="{{ form.nom.id_for_label }}">Nom</label>
        {{ form.nom }}
    </div>

    <button type="submit" class="btn btn-primary">
        Enregistrer
    </button>

    <a href="{% url 'gestion_ensg:profils' %}" class="btn btn-secondary">
        Annuler
    </a>
</form>
    </div>
</div>

{% endblock %}
