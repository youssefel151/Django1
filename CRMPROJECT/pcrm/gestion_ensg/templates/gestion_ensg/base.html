<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestion ENSG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-dark navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'gestion_ensg:home' %}">Gestion ENSG</a>
            <div class="navbar-nav">
                <a class="nav-link" href="{% url 'gestion_ensg:add' %}">Ajouter</a>
                <a class="nav-link" href="{% url 'gestion_ensg:specialites' %}">Specialites</a>
                <a class="nav-link" href="{% url 'gestion_ensg:profils' %}">Profils</a>
                <a class="nav-link" href="{% url 'gestion_ensg:grades' %}">Grades</a>
            </div>
        </div>
    </nav>

    <main class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fermer"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
