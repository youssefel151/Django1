<!doctype html>
{% load static %}
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestion ENSG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{% static 'gestion_ensg/style.css' %}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'gestion_ensg:home' %}">
                <span class="brand-mark"><i class="bi bi-building"></i></span>
                Gestion ENSG
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#ensgNavbar" aria-controls="ensgNavbar" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="ensgNavbar">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="{% url 'gestion_ensg:home' %}"><i class="bi bi-house me-1"></i>Accueil</a>
                    <a class="nav-link" href="{% url 'gestion_ensg:add' %}"><i class="bi bi-plus-lg me-1"></i>Ajouter</a>
                    <a class="nav-link" href="{% url 'gestion_ensg:specialites' %}"><i class="bi bi-tags me-1"></i>Specialites</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container app-shell">
        {% block content %}
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'gestion_ensg/script.js' %}"></script>
</body>
</html>
